<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keranjang Belanja - Flowers.co</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .product-image {
        transition: transform 0.3s ease;
      }
      .product-card:hover .product-image {
        transform: scale(1.05);
      }
    </style>
  </head>

  <body class="bg-[#fff5f7] min-h-screen">
    <nav
      class="sticky top-0 z-50 flex justify-between items-center px-8 py-5 bg-white/80 backdrop-blur-md border-b border-pink-100"
    >
      <h1
        class="text-3xl font-serif text-pink-700 hover:opacity-80 transition-opacity cursor-pointer" 
      >
      <a
          href="Homepage.html"
          class="text-3xl font-serif text-pink-700 hover:opacity-80 transition-opacity cursor-pointer"
        >
        Flowers.co
      </h1>
      <a
        href="Katalog.html"
        class="group flex items-center gap-2 text-pink-600 font-semibold hover:text-pink-700 transition"
      >
        <span class="group-hover:-translate-x-1 transition-transform">←</span>
        Kembali Belanja
      </a>
    </nav>

    <main class="max-w-6xl mx-auto p-8">
      <header class="mb-12">
        <h2 class="text-3xl font-extrabold text-slate-800">
          Keranjang Belanja
        </h2>
        <p class="text-slate-500">
          Tinjau rangkaian bunga pilihan anda sebelum check-out
        </p>
      </header>

      <div
        id="Keranjang"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
      ></div>

      <div id="cart-actions" class="mt-16 flex flex-col items-center gap-4 hidden">
          <div class="w-full flex justify-between items-center px-4 mb-2">
              <span class="text-slate-500 font-medium">Estimasi Total</span>
              <span id="total-estimasi" class="text-2xl font-bold text-pink-600">Rp 0</span>
          </div>

          <button onclick="prosesKePembayaran()" class="w-full py-4 bg-pink-500 text-white rounded-full font-bold shadow-lg hover:bg-pink-600 transition-all active:scale-95">
              Lanjutkan Pembayaran →
          </button>
    
          <button onclick="resetKeranjang()" class="text-slate-400 text-sm hover:text-red-500 transition underline">
              Kosongkan Keranjang
          </button>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
