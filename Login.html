<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login Buket Bunga</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="flex h-screen">
    <!-- kiri -->
    <div
      class="flex-1 bg-cover bg-center p-10 flex flex-col justify-end text-pink-200"
      style="background-image: url('images/bungabclogin.jpg')"
    >
      <h2 class="text-3xl font-bold">Flowers Your Moment</h2>

      <p class="mt-2">
        Karena setiap momen spesial pantas dirayakan dengan bunga terbaik.
      </p>
    </div>

    <!-- kanan -->
    <div class="flex-1 bg-pink-50 flex justify-center items-center">
      <form class="bg-white p-8 rounded-xl shadow-lg w-[300px]">
        <label class="font-semibold">Email</label>
        <input
          type="email"
          placeholder="Masukkan email"
          class="w-full p-2 mt-1 mb-4 border rounded"
        />

        <label class="font-semibold">Password</label>
        <input
          type="password"
          placeholder="Masukkan password"
          class="w-full p-2 mt-1 mb-4 border rounded"
        />

        <button
          class="w-full bg-pink-500 text-white p-2 rounded hover:bg-pink-600"
        >
          Masuk
        </button>

        <div class="flex justify-between mt-4 text-sm">
          <a href="#" class="text-pink-500">Lupa Password?</a>
          <a href="Daftar.html" class="text-pink-500">Daftar</a>
        </div>
      </form>
    </div>
  </body>
</html>

<!-- kode program javascript -->
<script>
    //Fungsi untuk validasi form login
    function validateForm() {
        //Membiarkan variabel mendapatkan value berdasarkan ID email dan password pada HTML
        let email = document.getElementById('email').value;
        let password = document.getElementById('password').value;
        let emailError = document.getElementById('emailError');
        let passwordError = document.getElementById('passwordError');

        //Mengambil elemen pesan error
        emailError.innerHTML = '' ;
        passwordError.innerHTML = '' ;

        //Validasi email dan password
        if (email === '') {
            emailError.innerHTML = 'Email harus diisi !';
            return false;
        } else if (!isValidEmail(email)) {
            emailError.innerHTML = "Format email tidak valid !";
            return false;
        }

        if (password === '') {
            passwordError.innerHTML = "Password harus diisi !";
            return false;
        } 
        
        alert('Login Berhasil !');
        return true;
        
    }

    //Fungsi untuk memvalidasi format email
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
</script>
</body>
</html>
