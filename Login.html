<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Flowers.co</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-pink-50 min-h-screen flex items-center justify-center p-4">
    <div
      class="bg-white w-full max-w-4xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col md:flex-row min-h-[600px]"
    >
      <div class="md:w-1/2 relative hidden md:block">
        <img
          src="images/PinkRoseBouquet.jpg"
          alt="Login Background"
          class="absolute inset-0 w-full h-full object-cover"
        />
        <div class="absolute inset-0 bg-pink-900/10"></div>
        <div class="absolute bottom-12 left-10 text-white z-10">
          <h2 class="text-4xl font-serif italic mb-2">Flowers Your Moment</h2>
          <p class="text-sm opacity-90 leading-relaxed max-w-xs">
            Karena setiap momen spesial pantas dirayakan dengan bunga terbaik.
          </p>
        </div>
      </div>

      <div class="md:w-1/2 p-10 lg:p-16 flex flex-col justify-center bg-white">
        <div class="mb-10">
          <h1 class="text-3xl font-serif italic text-slate-800">Masuk Akun</h1>
          <p class="text-gray-400 text-sm mt-2 leading-relaxed">
            Selamat datang kembali! Silakan masuk ke komunitas Flowers.co.
          </p>
        </div>

        <form class="space-y-5">
          <div>
            <label
              class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2"
              >Email</label
            >
            <input
              type="email"
              id="email"
              placeholder="Masukkan email Anda"
              class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-pink-200 transition text-sm"
            />
            <div
              id="emailError"
              class="text-[10px] text-red-500 mt-1 italic"
            ></div>
          </div>

          <div>
            <div class="flex justify-between items-center mb-2">
              <label
                class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest"
                >Password</label
              >
              <a
                href="Forgot-password.html"
                class="text-[10px] text-pink-400 hover:underline"
                >Lupa Password?</a
              >
            </div>
            <div class="relative">
              <input
                type="password"
                id="password"
                placeholder="Masukkan password"
                class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-pink-200 transition text-sm"
              />
              <button
                type="button"
                onclick="togglePasswordUI()"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  id="eyeIcon"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
            </div>
            <div
              id="passwordError"
              class="text-[10px] text-red-500 mt-1 italic"
            ></div>
          </div>

          <button
            type="button"
            onclick="validateForm()"
            class="w-full py-4 bg-[#d63384] text-white rounded-xl font-bold shadow-lg shadow-pink-100 hover:bg-pink-700 transition transform active:scale-95 mt-4"
          >
            Masuk Sekarang
          </button>
        </form>

        <p class="text-center mt-8 text-xs text-gray-500">
          Belum punya akun?
          <a
            href="Register.html"
            class="text-[#d63384] font-bold hover:underline"
            >Daftar di sini</a
          >
        </p>
      </div>
    </div>

    <script>
      function togglePass(inputId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const eyeIcon = document.getElementById(iconId);

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
    `;
        } else {
          passwordInput.type = "password";
          eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
    `;
        }
      }

      // Logika Validasi
      function validateForm() {
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        let emailError = document.getElementById("emailError");
        let passwordError = document.getElementById("passwordError");

        emailError.innerHTML = "";
        passwordError.innerHTML = "";

        if (email === "") {
          emailError.innerHTML = "Email harus diisi !";
          return false;
        } else if (!isValidEmail(email)) {
          emailError.innerHTML = "Format email tidak valid !";
          return false;
        }

        if (password === "") {
          passwordError.innerHTML = "Password harus diisi !";
          return false;
        }

        alert("Login Berhasil !");
        window.location.href = "Homepage.html";
        return true;
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }
    </script>
  </body>
</html>
