<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog - Flowers.co</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .font-serif {
        font-family: "Playfair Display", serif;
      }
      .category-active {
        color: #db2777;
        font-weight: 700;
        background-color: #fdf2f8;
        border-radius: 9999px;
        padding-left: 12px;
      }
    </style>
  </head>
  <body class="bg-white">
    <header class="border-b">
      <nav class="bg-white sticky top-0 z-50 bg-white shadow">
        <div
          class="container mx-auto px-6 py-4 flex items-center justify-between"
        >
          <a
            href="Homepage.html"
            class="text-3xl font-serif text-pink-700 hover:opacity-80 transition-opacity cursor-pointer"
          >
            Flowers.co
          </a>
          <div
            class="flex items-center gap-8 text-sm font-medium text-slate-700"
          >
            <a href="Homepage.html" class="hover:text-pink-600">Home</a>
            <a
              href="Katalog.html"
              class="hover:text-pink-600 font-semibold text-pink-700"
              >Catalogue</a
            >
            <a href="AboutUs.html" class="hover:text-pink-600">About Us</a>
          </div>
          <div class="flex items-center gap-6 text-slate-600">
            <button id="loginbtn" class="hover:text-pink-600 text-lg">
              👤
            </button>
            <button class="relative text-xl">
              <a href="Wishlist.html" class="relative group">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-8 w-8 text-slate-700 group-hover:text-pink-600 transition"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.5"
                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                  />
                </svg>
                <span
                  id="fav-count"
                  class="absolute -top-1 -right-2 bg-[#ed4492] text-white text-[11px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white"
                  >0</span
                >
              </a>
            </button>
            <a href="Keranjang.html" class="relative group">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-8 w-8 text-slate-700 group-hover:text-pink-600 transition"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
                />
              </svg>
              <span
                id="cart-count"
                class="absolute -top-1 -right-2 bg-[#ed4492] text-white text-[11px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white"
                >0</span
              >
            </a>
          </div>
        </div>
      </nav>
      <div class="py-12 bg-pink-50 border-b border-pink-100">
        <div class="container mx-auto px-6 text-center">
          <h2 class="text-5xl font-serif italic text-pink-600 mb-2">
            Catalogue
          </h2>
          <p class="text-gray-400 italic font-light">
            Temukan buket yang sempurna untuk setiap acara
          </p>
        </div>
      </div>
    </header>

    <main class="container mx-auto px-6 py-10 flex flex-col md:flex-row gap-8">
      <aside class="w-full md:w-1/4">
        <div
          class="bg-white p-6 rounded-3xl border border-pink-100 shadow-sm sticky top-24"
        >
          <input
            type="text"
            id="searchInput"
            placeholder="Cari Produk..."
            class="w-full px-5 py-3 border border-pink-100 rounded-full focus:ring-2 focus:ring-pink-300 outline-none mb-8 text-sm transition-all"
          />

          <h3
            class="font-serif italic text-xl text-pink-600 mb-4 border-b border-pink-50 pb-2"
          >
            Kategori
          </h3>
          <ul id="categoryList" class="space-y-2 text-gray-500 font-medium">
            <li
              onclick="filterProduk('SEMUA')"
              class="flex items-center gap-3 p-2 hover:text-pink-500 cursor-pointer transition-all category-active"
              data-cat="SEMUA"
            >
              ✨ Semua Produk
            </li>
            <li
              onclick="filterProduk('anniversary')"
              class="flex items-center gap-3 p-2 hover:text-pink-500 cursor-pointer transition-all"
              data-cat="aniversary"
            >
              <span>💗</span> Anniversary
            </li>
            <li
              onclick="filterProduk('ulang tahun')"
              class="flex items-center gap-3 p-2 hover:text-pink-500 cursor-pointer transition-all"
              data-cat="ulangtahun"
            >
              <span>🎂</span> Ulang Tahun
            </li>
            <li
              onclick="filterProduk('wisuda')"
              class="flex items-center gap-3 p-2 hover:text-pink-500 cursor-pointer transition-all"
              data-cat="wisuda"
            >
              <span>🎓</span> Wisuda
            </li>
            <li
              onclick="filterProduk('pernikahan')"
              class="flex items-center gap-3 p-2 hover:text-pink-500 cursor-pointer transition-all"
              data-cat="pernikahan"
            >
              <span>💍</span> Pernikahan
            </li>
          </ul>
        </div>
      </aside>

      <section class="w-full md:w-3/4">
        <div
          id="KatalogProduk"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 transition-all duration-500"
        ></div>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
