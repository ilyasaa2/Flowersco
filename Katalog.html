<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog - Flowersco.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .font-serif {
        font-family: "Playfair Display", serif;
      }
    </style>
  </head>
  <body class="bg-white">
    <header class="border-b">
       <div
      class="container mx-auto px-6 py-4 flex items-center justify-between"
      >
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
        <div class="text-3xl font-serif text-pink-700">Flowers.co</div>

        <div class="flex items-center gap-8 text-sm font-medium text-slate-700">
          <a href="Homepage.html" class="hover:text-pink-600">Home</a>
          <a href="Katalog.html" class="hover:text-pink-600 font-semibold text-pink-700">
            Catalogue
          </a>
          <a href="AboutUs.html" class="hover:text-pink-600">About Us</a>
        </div>
      </div>
    </div>
      <div
        class="py-12 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-pink-50"
      >
        <div class="container mx-auto px-6 text-center">
          <h2 class="text-5xl font-serif italic text-pink-600 mb-2">
            Catalogue
          </h2>
          <p class="text-gray-400 italic">
            Temukan buket yang sempurna untuk setiap acara
          </p>
        </div>
      </div>
    </header>

    <main class="container mx-auto px-6 py-10 flex flex-col md:flex-row gap-8">
      <aside class="w-full md:w-1/4">
        <div class="bg-white p-6 rounded-2xl border border-pink-100 shadow-sm">
          <input
            type="text"
            placeholder="Cari Produk..."
            class="w-full px-4 py-2 border border-pink-100 rounded-full focus:ring-2 focus:ring-pink-300 outline-none mb-6"
          />

          <h3
            class="font-serif italic text-xl text-pink-600 mb-4 border-b border-pink-50 pb-2"
          >
            Kategori
          </h3>
          <ul class="space-y-4 text-gray-600">
            <li
              class="flex items-center gap-3 hover:text-pink-500 cursor-pointer"
            >
              <span>⭐</span> Anniversary
            </li>
            <li
              class="flex items-center gap-3 hover:text-pink-500 cursor-pointer"
            >
              <span>🎂</span> Ulang Tahun
            </li>
            <li
              class="flex items-center gap-3 hover:text-pink-500 cursor-pointer"
            >
              <span>🎓</span> Wisuda
            </li>
            <li
              class="flex items-center gap-3 hover:text-pink-500 cursor-pointer"
            >
              <span>💍</span> Pernikahan
            </li>
          </ul>
        </div>
      </aside>

      <section class="w-full md:w-3/4">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
          <div
            class="group bg-white rounded-3xl p-4 border border-pink-50 shadow-sm hover:shadow-xl transition-all duration-300"
          >
            <div
              class="relative overflow-hidden rounded-2xl bg-pink-50 h-72 mb-4"
            >
              <img
                src="images/PinkRoseBouquet.jpg"
                class="object-cover w-full h-full group-hover:scale-110 transition-transform duration-500"
              />
              <span
                class="absolute top-3 right-3 bg-white/80 p-2 rounded-full text-pink-500"
                >❤️</span
              >
            </div>
            <div class="text-center">
              <p
                class="text-[10px] uppercase tracking-widest text-pink-400 font-bold mb-1"
              >
                Romantis
              </p>
              <h4 class="font-serif text-lg text-slate-800 mb-2">
                Pink Rose Bouquet
              </h4>
              <div class="flex justify-center items-center gap-2 mb-4">
                <span class="text-pink-500 font-bold">$ 15.99</span>
                <span class="text-gray-300 line-through text-sm">$ 18.99</span>
              </div>
              <button onclick="tambahKeranjang('Pink Rose Bouquet')"
                class="w-full py-3 bg-pink-500 text-white rounded-xl font-bold hover:bg-pink-600 transition shadow-lg shadow-pink-200"
              >
                Add to bag
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
