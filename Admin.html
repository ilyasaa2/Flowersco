<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Flowers.co</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .font-serif {
        font-family: "Playfair Display", serif;
      }
    </style>
  </head>
  <body class="bg-pink-50/30 min-h-screen pb-20">
    <nav
      class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-pink-100"
    >
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <h1 class="text-2xl font-serif italic text-pink-800">
          Flowers.co
          <span class="text-xs font-sans not-italic text-slate-400 ml-2"
            >Admin Mode</span
          >
        </h1>
        <a
          href="Katalog.html"
          class="text-sm text-slate-500 hover:text-pink-600 transition"
          >Lihat Toko &rarr;</a
        >
      </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 px-6">
      <div class="flex flex-col md:flex-row gap-8">
        <div class="md:w-1/3">
          <div
            class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-pink-100/50 sticky top-24 border border-pink-50"
          >
            <h3
              id="formTitle"
              class="text-xl font-serif italic text-slate-800 mb-6"
            >
              Tambah Produk Baru
            </h3>

            <form id="productForm" class="space-y-4">
              <div>
                <label
                  class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1"
                  >Nama Bunga</label
                >
                <input
                  type="text"
                  id="prodName"
                  placeholder="Contoh: Sun Flower"
                  class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-pink-200 transition text-sm"
                />
              </div>

              <div>
                <label
                  class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1"
                  >Harga ($)</label
                >
                <input
                  type="number"
                  id="prodPrice"
                  step="0.01"
                  placeholder="15.99"
                  class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-pink-200 transition text-sm"
                />
              </div>

              <div>
                <label
                  class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1"
                  >URL Gambar</label
                >
                <input
                  type="text"
                  id="prodImg"
                  placeholder="images/flower-name.jpg"
                  class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-pink-200 transition text-sm"
                />
              </div>

              <button
                type="button"
                onclick="saveProduct()"
                class="w-full py-3 bg-pink-500 text-white rounded-xl font-bold shadow-lg hover:bg-pink-600 transition transform hover:-translate-y-0.5 pt-4 mt-4"
              >
                Simpan Produk
              </button>
              <button
                type="button"
                onclick="resetForm()"
                id="cancelBtn"
                class="hidden w-full py-2 text-slate-400 text-xs hover:text-red-500 transition"
              >
                Batal Edit
              </button>
            </form>
          </div>
        </div>

        <div class="md:w-2/3">
          <div
            class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl shadow-pink-100/50 border border-pink-50"
          >
            <table class="w-full text-left border-collapse">
              <thead>
                <tr
                  class="bg-pink-50/50 text-[10px] font-bold text-gray-400 uppercase tracking-widest"
                >
                  <th class="px-6 py-4">Produk</th>
                  <th class="px-6 py-4">Harga</th>
                  <th class="px-6 py-4 text-center">Aksi</th>
                </tr>
              </thead>
              <tbody
                id="adminProductList"
                class="divide-y divide-pink-50"
              ></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script>
      // Data Dummy (Nanti ini ditarik dari Database MySQL/Localstorage)
      let products = JSON.parse(localStorage.getItem("katalog_produk")) || [
        {
          id: 1,
          nama: "Pink Rose Bouquet",
          harga: 15.99,
          gambar: "images/PinkRoseBouquet.jpg",
        },
        {
          id: 2,
          nama: "Calla Lily Bouquet",
          harga: 15.99,
          gambar: "images/CallaLilyBouquet.jpg",
        },
      ];

      let editId = null;

      function renderAdminProducts() {
        const list = document.getElementById("adminProductList");
        list.innerHTML = products
          .map(
            (p, index) => `
                <tr class="hover:bg-pink-50/20 transition">
                    <td class="px-6 py-4 flex items-center gap-4">
                        <img src="${p.gambar}" class="w-12 h-12 rounded-lg object-cover shadow-sm">
                        <span class="font-semibold text-slate-700 text-sm">${p.nama}</span>
                    </td>
                    <td class="px-6 py-4 text-sm text-pink-600 font-bold">$${p.harga}</td>
                    <td class="px-6 py-4">
                        <div class="flex justify-center gap-2">
                            <button onclick="editProduct(${index})" class="p-2 hover:bg-blue-50 text-blue-400 rounded-lg transition">✏️</button>
                            <button onclick="deleteProduct(${index})" class="p-2 hover:bg-red-50 text-red-400 rounded-lg transition">🗑️</button>
                        </div>
                    </td>
                </tr>
            `,
          )
          .join("");
        localStorage.setItem("katalog_produk", JSON.stringify(products));
      }

      function saveProduct() {
        const nama = document.getElementById("prodName").value;
        const harga = document.getElementById("prodPrice").value;
        const gambar = document.getElementById("prodImg").value;

        if (!nama || !harga) return alert("Isi data dulu!");

        if (editId !== null) {
          products[editId] = { ...products[editId], nama, harga, gambar };
          editId = null;
        } else {
          products.push({ id: Date.now(), nama, harga, gambar });
        }

        resetForm();
        renderAdminProducts();
      }

      function editProduct(index) {
        const p = products[index];
        document.getElementById("prodName").value = p.nama;
        document.getElementById("prodPrice").value = p.harga;
        document.getElementById("prodImg").value = p.gambar;
        document.getElementById("formTitle").innerText = "Edit Produk";
        document.getElementById("cancelBtn").classList.remove("hidden");
        editId = index;
      }

      function deleteProduct(index) {
        if (confirm("Hapus produk ini?")) {
          products.splice(index, 1);
          renderAdminProducts();
        }
      }

      function resetForm() {
        document.getElementById("productForm").reset();
        document.getElementById("formTitle").innerText = "Tambah Produk Baru";
        document.getElementById("cancelBtn").classList.add("hidden");
        editId = null;
      }

      renderAdminProducts();
    </script>
  </body>
</html>
