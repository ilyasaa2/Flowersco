<!doctype html>
<html lang="id">
  <head>
    <!doctype html>
    <html lang="id">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Daftar Akun - Flowers.co</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
          href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap"
          rel="stylesheet"
        />
      </head>
      <body
        class="bg-pink-50 min-h-screen flex items-center justify-center p-4"
      >
        <div
          class="bg-white w-full max-w-4xl rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col md:flex-row min-h-[600px]"
        >
          <div class="md:w-1/2 relative hidden md:block">
            <img
              src="images/PinkRoseBouquet.jpg"
              alt="Login Background"
              class="absolute inset-0 w-full h-full object-cover"
            />
            <div class="absolute inset-0 bg-pink-900/10"></div>
            <div class="absolute bottom-12 left-10 text-white z-10">
              <h2 class="text-4xl font-serif italic mb-2">
                Flowers Your Moment
              </h2>
              <p class="text-sm opacity-90 leading-relaxed max-w-xs">
                Karena setiap momen spesial pantas dirayakan dengan bunga
                terbaik.
              </p>
            </div>
          </div>

          <div class="md:w-1/2 p-10 flex flex-col justify-center">
            <div class="mb-8">
              <h1 class="text-3xl font-serif italic text-slate-800">
                Daftar Akun
              </h1>
              <p class="text-gray-400 text-sm mt-2">
                Bergabunglah untuk pengalaman belanja yang lebih personal.
              </p>
            </div>

            <form class="space-y-5">
              <div>
                <label
                  class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2"
                  >Email</label
                >
                <input
                  type="email"
                  placeholder="Masukkan email Anda"
                  class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-pink-200 transition text-sm"
                />
              </div>

              <div>
                <label
                  class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2"
                  >Password</label
                >
                <div class="relative">
                  <input
                    type="password"
                    id="regPassword"
                    placeholder="Buat password"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-pink-200 transition text-sm"
                  />
                  <button
                    type="button"
                    onclick="togglePass('regPassword', 'eyeReg')"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      id="eyeReg"
                      class="h-5 w-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                      />
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                      />
                    </svg>
                  </button>
                </div>
              </div>

              <div>
                <label
                  class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2"
                  >Konfirmasi Password</label
                >
                <div class="relative">
                  <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Ulangi password"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-pink-200 transition text-sm"
                  />
                  <button
                    type="button"
                    onclick="togglePass('confirmPassword', 'eyeConfirm')"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      id="eyeConfirm"
                      class="h-5 w-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                      />
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                      />
                    </svg>
                  </button>
                </div>
              </div>

              <button
                type="submit"
                class="w-full py-3 bg-[#d63384] text-white rounded-xl font-bold shadow-lg shadow-pink-100 hover:bg-pink-700 transition transform hover:-translate-y-0.5 mt-4"
              >
                Daftar Sekarang
              </button>
            </form>

            <p class="text-center mt-8 text-xs text-gray-500">
              Sudah punya akun?
              <a
                href="Login.html"
                class="text-[#d63384] font-bold hover:underline"
                >Masuk di sini</a
              >
            </p>
          </div>
        </div>

        <!-- Kode program JS -->
        <script>
          function validateForm() {
            let emailError = document.getElementById("emailError");
            let passwordError = document.getElementById("passwordError");
            let confirmError = document.getElementById("confirmError");
            let successMessage = document.getElementById("successMessage");

            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();
            let confirmPassword = document
              .getElementById("confirmPassword")
              .value.trim();

            emailError.innerHTML = "";
            passwordError.innerHTML = "";
            confirmError.innerHTML = "";
            successMessage.innerHTML = "";

            let isValid = true;

            if (email === "") {
              emailError.innerHTML = "Email harus diisi !";
              isValid = false;
            } else if (!isValidEmail(email)) {
              emailError.innerHTML = "Format email tidak valid !";
              isValid = false;
            } else if (isEmailRegistered(email)) {
              emailError.innerHTML = "Email sudah terdaftar !";
              isValid = false;
            }

            if (password === "") {
              passwordError.innerHTML = "Password tidak boleh kosong !";
              isValid = false;
            } else if (password.length < 6) {
              passwordError.innerHTML = "Password minimal 6 karakter !";
              isValid = false;
            } else if (!isStrongPassword(password)) {
              passwordError.innerHTML =
                "Password harus mengandung huruf besar, huruf kecil, dan angka !";
              isValid = false;
            }

            if (confirmPassword === "") {
              confirmError.innerHTML = "Konfirmasi password harus diisi !";
              isValid = false;
            } else if (password !== confirmPassword) {
              confirmError.innerHTML = "Password tidak cocok !";
              isValid = false;
            }

            if (isValid) {
              //Menyimpan user ke local storage (simulasi database)
              saveUser(email, password);

              successMessage.innerHTML = "Registrasi berhasil, silahkan login";

              document.getElementById("email").value = "";
              document.getElementById("password").value = "";
              document.getElementById("confirmPassword").value = "";

              setTimeout(function () {
                window.location.href = "Login.html";
              }, 2000);
            }
            return isValid;
          }

          function isValidEmail(email) {
            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailPattern.test(email);
          }

          function isStrongPassword(password) {
            let hasUpperCase = /[A-Z]/.test(password);
            let hasLowerCase = /[a-z]/.test(password);
            let hasNumber = /[0-9]/.test(password);

            return hasUpperCase && hasLowerCase && hasNumber;
          }

          function isEmailRegistered(email) {
            let users = JSON.parse(localStorage.getItem("users")) || [];
            return users.some((user) => user.email === email);
          }

          // Fungsi untuk show/hide password
          function togglePass(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(iconId);

            if (passwordInput.type === "password") {
              passwordInput.type = "text";
              // Mengubah icon mata menjadi mata tertutup (opsional)
              eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
    `;
            } else {
              passwordInput.type = "password";
              // Mengembalikan ke icon mata terbuka
              eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
    `;
            }
          }

          function saveUser(email, password) {
            let users = JSON.parse(localStorage.getItem("users")) || [];

            users.push({
              email: email,
              password: password,
              registeredAt: new Date().toISOString(),
            });

            localStorage.setItem("users", JSON.stringify(users));
          }

          document
            .getElementById("email")
            .addEventListener("input", function () {
              let emailError = document.getElementById("emailError");
              if (
                this.value.trim() !== "" &&
                !isValidEmail(this.value.trim())
              ) {
                emailError.innerHTML = "Format email tidak valid !";
              } else {
                emailError.innerHTML = "";
              }
            });

          document
            .getElementById("password")
            .addEventListener("input", function () {
              let passwordError = document.getElementById("passwordError");
              if (this.value.trim() !== "" && this.value.trim().length < 6) {
                passwordError.innerHTML = "Password minimal 6 karakter !";
              } else {
                passwordError.innerHTML = "";
              }
            });

          document
            .getElementById("confirmPassword")
            .addEventListener("input", function () {
              let confirmError = document.getElementById("confirmError");
              let password = document.getElementById("password").value.trim();
              if (this.value.trim() !== "" && this.value.trim() !== password) {
                confirmError.innerHTML = "Password tidak cocok !";
              } else {
                confirmError.innerHTML = "";
              }
            });

          document
            .getElementById("registerForm")
            .addEventListener("keypress", function (e) {
              if (e.key === "Enter") {
                e.preventDefault();
                validateForm();
              }
            });
        </script>
      </body>
    </html>
  </head>
</html>
